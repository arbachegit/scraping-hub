# =============================================================================
# Docker Compose — Production (Deterministic Deployment)
# =============================================================================
# Tags SHA imutaveis — NUNCA usar "latest"
#
# VARIAVEIS OBRIGATORIAS (definidas em .env):
#   IMAGE_TAG     - Tag da imagem (ex: sha-2f3a1b4c5d6e)
#   IMAGE_PREFIX  - Prefixo do registry (ex: ghcr.io/arbachegit/iconsai-scraping)
#
# REGRAS INVIOLAVEIS:
#   1. NUNCA usar tag "latest"
#   2. NUNCA usar "build:" em producao
#   3. SEMPRE pull_policy: always
#   4. SEMPRE healthcheck definido
# =============================================================================

x-common-logging: &common-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-common-labels: &common-labels
  com.iconsai.environment: "production"
  com.iconsai.image_tag: "${IMAGE_TAG}"

services:
  # ============================================
  # Next.js Frontend (port 3000)
  # ============================================
  web:
    image: ${IMAGE_PREFIX:?IMAGE_PREFIX obrigatorio}-web:${IMAGE_TAG:?IMAGE_TAG obrigatorio}
    container_name: iconsai-web
    pull_policy: always
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PYTHON_API_URL=http://api:8000
      - NODEJS_API_URL=http://backend:3001
      - GIT_SHA=${GIT_SHA}
      - BUILD_DATE=${BUILD_DATE}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
      backend:
        condition: service_healthy
    labels:
      <<: *common-labels
      com.iconsai.service: "web"
    logging: *common-logging
    networks:
      - iconsai-network

  # ============================================
  # Python API — FastAPI (port 8000)
  # ============================================
  api:
    image: ${IMAGE_PREFIX:?IMAGE_PREFIX obrigatorio}-api:${IMAGE_TAG:?IMAGE_TAG obrigatorio}
    container_name: iconsai-api
    pull_policy: always
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      # APIs
      - SERPER_API_KEY=${SERPER_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - APOLLO_API_KEY=${APOLLO_API_KEY}
      - CNPJA_API_KEY=${CNPJA_API_KEY}
      # Brasil Data Hub
      - BRASIL_DATA_HUB_URL=${BRASIL_DATA_HUB_URL}
      - BRASIL_DATA_HUB_KEY=${BRASIL_DATA_HUB_KEY}
      # Auth
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      # Email (Resend)
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@iconsai.ai}
      # Atlas LLM
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Version tracking
      - GIT_SHA=${GIT_SHA}
      - BUILD_DATE=${BUILD_DATE}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      <<: *common-labels
      com.iconsai.service: "api"
    logging: *common-logging
    networks:
      - iconsai-network

  # ============================================
  # Node.js Backend — Express (port 3001)
  # ============================================
  backend:
    image: ${IMAGE_PREFIX:?IMAGE_PREFIX obrigatorio}-backend:${IMAGE_TAG:?IMAGE_TAG obrigatorio}
    container_name: iconsai-backend
    pull_policy: always
    restart: always
    ports:
      - "3001:3001"
    environment:
      # Node env
      - NODE_ENV=production
      - BACKEND_PORT=3001
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      # APIs
      - SERPER_API_KEY=${SERPER_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - APOLLO_API_KEY=${APOLLO_API_KEY}
      - CNPJA_API_KEY=${CNPJA_API_KEY}
      # Brasil Data Hub
      - BRASIL_DATA_HUB_URL=${BRASIL_DATA_HUB_URL}
      - BRASIL_DATA_HUB_KEY=${BRASIL_DATA_HUB_KEY}
      # Atlas LLM
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Version tracking
      - GIT_SHA=${GIT_SHA}
      - BUILD_DATE=${BUILD_DATE}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      <<: *common-labels
      com.iconsai.service: "backend"
    logging: *common-logging
    networks:
      - iconsai-network

  # ============================================
  # Scheduler (coleta automatizada, sem porta)
  # ============================================
  scheduler:
    image: ${IMAGE_PREFIX:?IMAGE_PREFIX obrigatorio}-scheduler:${IMAGE_TAG:?IMAGE_TAG obrigatorio}
    container_name: iconsai-scheduler
    pull_policy: always
    restart: always
    environment:
      # Environment
      - ENVIRONMENT=production
      - DEBUG=false
      # APIs
      - SERPER_API_KEY=${SERPER_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - APOLLO_API_KEY=${APOLLO_API_KEY}
      - CNPJA_API_KEY=${CNPJA_API_KEY}
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      # Brasil Data Hub
      - BRASIL_DATA_HUB_URL=${BRASIL_DATA_HUB_URL}
      - BRASIL_DATA_HUB_KEY=${BRASIL_DATA_HUB_KEY}
      # Scheduler config
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-true}
      - SCHEDULER_HOUR=${SCHEDULER_HOUR:-2}
      - SCHEDULER_MINUTE=${SCHEDULER_MINUTE:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Version tracking
      - GIT_SHA=${GIT_SHA}
      - BUILD_DATE=${BUILD_DATE}
    volumes:
      - scheduler_logs:/app/logs
    labels:
      <<: *common-labels
      com.iconsai.service: "scheduler"
    logging: *common-logging
    networks:
      - iconsai-network

volumes:
  scheduler_logs:

networks:
  iconsai-network:
    driver: bridge
    name: iconsai-network
