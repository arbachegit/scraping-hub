# IconsAI Scraping - Docker Compose Development
# Uso: docker compose -f docker-compose.dev.yml up -d

services:
  # =============================================
  # Backend Node.js (porta 3006)
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iconsai-backend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    ports:
      - "3006:3006"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - BACKEND_PORT=3006
      - ALLOWED_ORIGINS=http://localhost:3002
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - iconsai-network

  # =============================================
  # Backend Python FastAPI (porta 8000)
  # =============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iconsai-api-dev
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - PYTHONPATH=/app
    volumes:
      - ./api:/app/api
      - ./src:/app/src
      - ./config:/app/config
      - ./backend:/app/backend
      - ./requirements.txt:/app/requirements.txt:ro
      - ./VERSION:/app/VERSION:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - iconsai-network

  # =============================================
  # Frontend Next.js (porta 3002)
  # =============================================
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: iconsai-web-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PYTHON_API_URL=http://api:8000
      - NODEJS_API_URL=http://backend:3006
    volumes:
      - ./apps/web:/app
    depends_on:
      - backend
      - api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - iconsai-network

networks:
  iconsai-network:
    driver: bridge
