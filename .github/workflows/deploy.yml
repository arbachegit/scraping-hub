# =============================================================================
# DETERMINISTIC DOCKER DEPLOY — iconsai-scraping
# =============================================================================
# Garante deploy deterministico usando:
# 1. Tags SHA imutaveis (ghcr.io/user/repo-svc:sha-<12chars>)
# 2. PROIBIDO usar tag "latest" em producao
# 3. Pull forcado + recreate no Droplet
# 4. Verificacao pos-deploy (SHA no container == SHA do deploy)
# 5. Rollback automatico se verificacao falhar
# 6. Script de deploy externalizado (deploy_compose.sh)
# =============================================================================
#
# SECRETS OBRIGATORIOS:
#   DO_HOST            - IP do Droplet
#   DO_USERNAME        - Usuario SSH (default: root)
#   DO_SSH_KEY         - Chave privada SSH
#   GHCR_PAT           - Personal Access Token para GHCR (read:packages)
#   SUPABASE_URL, SUPABASE_KEY, SUPABASE_SERVICE_KEY
#   SERPER_API_KEY, PERPLEXITY_API_KEY, APOLLO_API_KEY, CNPJA_API_KEY
#   BRASIL_DATA_HUB_URL, BRASIL_DATA_HUB_KEY
#   JWT_SECRET_KEY, ANTHROPIC_API_KEY
#   FIELD_ENCRYPTION_KEY, SEED_ADMIN_EMAIL, SEED_ADMIN_PASSWORD
#   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, EMAIL_FROM
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha_override:
        description: 'SHA especifico para deploy (opcional, usa HEAD se vazio)'
        required: false
        type: string

# CRITICO: Cancela deploys anteriores pendentes para evitar race conditions
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/iconsai-scraping

permissions:
  contents: write
  packages: write

jobs:
  # ===========================================
  # Job 1: Test
  # ===========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Security audit (Node.js)
        run: |
          cd backend && npm audit --audit-level=high

      - name: Security audit (Python)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Run linting
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml || true

  # ===========================================
  # Job 2: Build and Push Docker Images
  # ===========================================
  build:
    name: Build & Push Images
    needs: test
    runs-on: ubuntu-latest

    outputs:
      sha_full: ${{ steps.vars.outputs.sha_full }}
      sha_short: ${{ steps.vars.outputs.sha_short }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      build_date: ${{ steps.vars.outputs.build_date }}

    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          SHA_FULL="${{ github.event.inputs.sha_override || github.sha }}"
          SHA_SHORT="${SHA_FULL:0:12}"
          IMAGE_TAG="sha-${SHA_SHORT}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "sha_full=${SHA_FULL}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

          echo "============================================"
          echo "DEPLOY SHA:   ${SHA_FULL}"
          echo "IMAGE TAG:    ${IMAGE_TAG}"
          echo "BUILD DATE:   ${BUILD_DATE}"
          echo "============================================"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Web (Next.js) ---
      - name: Build and Push — web
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-web:${{ steps.vars.outputs.image_tag }}
          build-args: |
            GIT_SHA=${{ steps.vars.outputs.sha_short }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
            NEXT_PUBLIC_API_URL=https://scraping.iconsai.ai
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ steps.vars.outputs.sha_full }}

      # --- API (Python FastAPI) ---
      - name: Build and Push — api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api:${{ steps.vars.outputs.image_tag }}
          build-args: |
            GIT_SHA=${{ steps.vars.outputs.sha_short }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ steps.vars.outputs.sha_full }}

      # --- Backend (Node.js Express) ---
      - name: Build and Push — backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-backend:${{ steps.vars.outputs.image_tag }}
          build-args: |
            GIT_SHA=${{ steps.vars.outputs.sha_short }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ steps.vars.outputs.sha_full }}

      # --- Scheduler (Python) ---
      - name: Build and Push — scheduler
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scheduler/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-scheduler:${{ steps.vars.outputs.image_tag }}
          build-args: |
            GIT_SHA=${{ steps.vars.outputs.sha_short }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ steps.vars.outputs.sha_full }}

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements -i requirements.txt -o sbom-python.json --format json
        continue-on-error: true

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.json
          retention-days: 90

      - name: Build Summary
        run: |
          echo "============================================"
          echo "BUILD COMPLETE"
          echo "============================================"
          echo "SHA:       ${{ steps.vars.outputs.sha_full }}"
          echo "Tag:       ${{ steps.vars.outputs.image_tag }}"
          echo "Images:"
          echo "  - ${{ env.IMAGE_PREFIX }}-web:${{ steps.vars.outputs.image_tag }}"
          echo "  - ${{ env.IMAGE_PREFIX }}-api:${{ steps.vars.outputs.image_tag }}"
          echo "  - ${{ env.IMAGE_PREFIX }}-backend:${{ steps.vars.outputs.image_tag }}"
          echo "  - ${{ env.IMAGE_PREFIX }}-scheduler:${{ steps.vars.outputs.image_tag }}"
          echo "============================================"

  # ===========================================
  # Job 3: Deploy to Production
  # ===========================================
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Increment version
        run: |
          NEW_VERSION=$(python scripts/version.py --deploy)
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "New version: $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add VERSION
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ env.VERSION }} [skip ci]"
          git push || echo "Nothing to push"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy deploy scripts to server
        env:
          HOST: ${{ secrets.DO_HOST }}
          USER: ${{ secrets.DO_USERNAME }}
        run: |
          scp -i ~/.ssh/deploy_key \
            scripts/deploy_compose.sh \
            scripts/verify_runtime.sh \
            docker-compose.prod.yml \
            $USER@$HOST:/opt/iconsai-scraping/

      - name: Write .env on server
        env:
          HOST: ${{ secrets.DO_HOST }}
          USER: ${{ secrets.DO_USERNAME }}
        run: |
          ssh -i ~/.ssh/deploy_key $USER@$HOST "cat > /opt/iconsai-scraping/.env" << EOF
          # ============================================
          # Auto-generated by CI/CD — $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # NUNCA editar manualmente (sera sobrescrito)
          # ============================================

          # Imagens Docker (tag imutavel)
          IMAGE_TAG=${{ needs.build.outputs.image_tag }}
          IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}

          # Version tracking
          GIT_SHA=${{ needs.build.outputs.sha_short }}
          BUILD_DATE=${{ needs.build.outputs.build_date }}

          # API Keys
          APOLLO_API_KEY=${{ secrets.APOLLO_API_KEY }}
          CNPJA_API_KEY=${{ secrets.CNPJA_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}

          # Supabase
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}

          # Brasil Data Hub
          BRASIL_DATA_HUB_URL=${{ secrets.BRASIL_DATA_HUB_URL }}
          BRASIL_DATA_HUB_KEY=${{ secrets.BRASIL_DATA_HUB_KEY }}

          # JWT Auth
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}

          # Atlas LLM
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

          # Auth Level 1
          FIELD_ENCRYPTION_KEY=${{ secrets.FIELD_ENCRYPTION_KEY }}
          SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}

          # SMTP
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}

          # Scheduler
          SCHEDULER_ENABLED=true
          SCHEDULER_HOUR=2
          SCHEDULER_MINUTE=0
          LOG_LEVEL=INFO
          EOF

      - name: Login GHCR on server
        env:
          HOST: ${{ secrets.DO_HOST }}
          USER: ${{ secrets.DO_USERNAME }}
        run: |
          ssh -i ~/.ssh/deploy_key $USER@$HOST \
            "echo '${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Execute deploy
        env:
          HOST: ${{ secrets.DO_HOST }}
          USER: ${{ secrets.DO_USERNAME }}
          SHA: ${{ needs.build.outputs.sha_short }}
        run: |
          echo "============================================"
          echo "DEPLOYING SHA: ${SHA}"
          echo "IMAGE TAG:    ${{ needs.build.outputs.image_tag }}"
          echo "============================================"

          ssh -i ~/.ssh/deploy_key $USER@$HOST \
            "cd /opt/iconsai-scraping && chmod +x deploy_compose.sh && ./deploy_compose.sh ${SHA}"

      - name: Verify deployment
        env:
          HOST: ${{ secrets.DO_HOST }}
          USER: ${{ secrets.DO_USERNAME }}
        run: |
          ssh -i ~/.ssh/deploy_key $USER@$HOST \
            "cd /opt/iconsai-scraping && chmod +x verify_runtime.sh && ./verify_runtime.sh"

      - name: Update nginx
        env:
          HOST: ${{ secrets.DO_HOST }}
          USER: ${{ secrets.DO_USERNAME }}
        run: |
          ssh -i ~/.ssh/deploy_key $USER@$HOST 'bash -s' << 'NGINX_SCRIPT'
          sudo tee /etc/nginx/sites-available/scraping-hub > /dev/null << 'NGINX_EOF'
          server {
              listen 80;
              server_name scraping.iconsai.ai;
              return 301 https://$server_name$request_uri;
          }
          server {
              listen 443 ssl http2;
              server_name scraping.iconsai.ai;
              ssl_certificate /etc/letsencrypt/live/scraping.iconsai.ai/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/scraping.iconsai.ai/privkey.pem;
              ssl_session_timeout 1d;
              ssl_session_cache shared:SSL:50m;
              ssl_protocols TLSv1.2 TLSv1.3;
              add_header Strict-Transport-Security "max-age=63072000" always;

              # Python API docs
              location /docs {
                  proxy_pass http://127.0.0.1:8000/docs;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /redoc {
                  proxy_pass http://127.0.0.1:8000/redoc;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /openapi.json {
                  proxy_pass http://127.0.0.1:8000/openapi.json;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
              }
              location /health {
                  proxy_pass http://127.0.0.1:8000/health;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
              }
              location /version {
                  proxy_pass http://127.0.0.1:8000/version;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
              }

              # Auth routes -> Python API
              location /api/auth/ {
                  proxy_pass http://127.0.0.1:8000/auth/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
              }

              # Atlas agent -> Python API
              location /api/atlas/ {
                  proxy_pass http://127.0.0.1:8000/atlas/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
              }

              # Admin routes -> Python API
              location /api/admin/ {
                  proxy_pass http://127.0.0.1:8000/admin/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
              }

              # Stats routes -> Python API
              location /api/stats/ {
                  proxy_pass http://127.0.0.1:8000/api/stats/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
              }

              # Other API routes -> Node.js backend
              location /api/ {
                  proxy_pass http://127.0.0.1:3001/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
              }

              # Next.js frontend
              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 300s;
              }
          }
          NGINX_EOF

          sudo ln -sf /etc/nginx/sites-available/scraping-hub /etc/nginx/sites-enabled/
          sudo nginx -t && sudo systemctl reload nginx
          NGINX_SCRIPT

      - name: External verification
        run: |
          sleep 5
          curl -sf https://scraping.iconsai.ai/health | jq . || echo "Warning: External health check pending"
          curl -sf https://scraping.iconsai.ai/version | jq . || echo "Warning: External version check pending"

      - name: Deploy Summary
        run: |
          echo "## Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** ${{ needs.build.outputs.sha_full }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ needs.build.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://scraping.iconsai.ai" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-web:${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-api:${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-backend:${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-scheduler:${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
